<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome App</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <div class="logout">
      <button class="logout-button">로그아웃</button>
    </div>
    <div class="weather">
      <span class="city"></span>
      <span class="temp"></span>
    </div>
    <section>
      <div class="clock">
        <h1 class="time">00:00:00:00</h1>
        <span class="date">1월 1일</span>
      </div>

      <form class="todo-login-form">
        <input
          type="text"
          name="username"
          class="todo-login-input"
          placeholder="이름을 입력하세요"
          autofocus
          required
        />
        <button type="submit" class="todo-login-button">로그인</button>
      </form>

      <form class="todo-form">
        <input
          type="text"
          name="todo"
          class="todo-input"
          placeholder="할 일을 입력하세요"
        />
        <button class="todo-button" type="submit">추가</button>
      </form>
      <ul class="todo-list">
        <li class="todo-item">
          <!-- <span class="todo-text"></span>
          <button class="complete-button">완료</button>
          <button class="delete-button">삭제</button> -->
        </li>
      </ul>
    </section>
    <script type="module" src="js/index.js"></script>
  </body>
</html>
