<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chrome App</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="logout">
      <button class="logout-button">로그아웃</button>
    </div>
    <div class="weather">
      <span class="city">임시</span>
      <span class="temp">임시</span>
      <span class="condition">임시</span>
    </div>
    <section>
      <div class="clock">
        <h1 class="time">00:00:00:00</h1>
        <span class="date">1월 1일</span>
      </div>

      <div class="todo-login">
        <form action="" class="todo-login-form">
          <input
            type="text"
            class="todo-login-input"
            placeholder="이름을 입력하세요"
          />
          <button type="submit" class="todo-login-button">로그인</button>
        </form>
      </div>

      <div class="todo">
        <form action="" class="todo-form">
          <input
            type="text"
            class="todo-input"
            placeholder="할 일을 입력하세요"
          />
          <button class="todo-submit" type="submit">추가</button>
        </form>
        <ul class="todo-list">
          <li class="todo-item">
            <span class="todo-text"></span>
            <button class="complete-button">완료</button>
            <button class="delete-button">삭제</button>
          </li>
        </ul>
      </div>
    </section>
    <script src="js/index.js"></script>
    <!-- <script src="js/weather.js"></script> -->
  </body>
</html>
